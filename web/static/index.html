<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>FluxChi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --black: #000000;
  --dark: #0a0a0a;
  --surface: #111111;
  --line: #1a1a1a;
  --muted: #555555;
  --dim: #888888;
  --text: #d4d4d4;
  --white: #ffffff;
  --red: #d71921;
  --red-dim: rgba(215, 25, 33, 0.12);
  --green: #3ddc84;
  --green-dim: rgba(61, 220, 132, 0.12);
  --yellow: #e8b931;
  --yellow-dim: rgba(232, 185, 49, 0.12);
  --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { background: var(--black); }

body {
  font-family: var(--mono);
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── Header ── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
}
.hdr-brand {
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white);
}
.hdr-brand i { color: var(--red); font-style: normal; }
.hdr-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
}
.dot.on { background: var(--red); box-shadow: 0 0 8px var(--red); }

/* ── Layout ── */
.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px 32px;
}

@media (min-width: 768px) {
  .page {
    max-width: 960px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
  }
  .full { grid-column: 1 / -1; }
}

/* ── Section ── */
.sec {
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
}
.sec:last-child { border-bottom: none; }
.sec-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}

/* ── Stamina ring ── */
.ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.ring-svg { width: 200px; height: 200px; }
.ring-bg { fill: none; stroke: var(--line); stroke-width: 6; }
.ring-fg {
  fill: none;
  stroke: var(--red);
  stroke-width: 6;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1), stroke 0.4s;
}
.ring-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.ring-outer { position: relative; display: inline-block; }
.ring-num {
  font-size: 56px;
  font-weight: 700;
  color: var(--white);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.ring-unit {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 1px;
}
.ring-state {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── Stat row ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-top: 20px;
}
.stat {
  background: var(--black);
  padding: 14px 8px;
  text-align: center;
}
.stat-val {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  font-variant-numeric: tabular-nums;
}
.stat-lbl {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── Dimensions ── */
.dims {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 16px;
}
.dim {
  text-align: center;
  padding: 12px 4px;
  border: 1px solid var(--line);
}
.dim-val {
  font-size: 18px;
  font-weight: 700;
  color: var(--white);
  font-variant-numeric: tabular-nums;
}
.dim-bar {
  width: 100%;
  height: 3px;
  background: var(--line);
  margin: 8px 0 6px;
  position: relative;
  overflow: hidden;
}
.dim-bar-fill {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  background: var(--red);
  transition: width 0.4s;
}
.dim-lbl {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Suggestion banner ── */
.banner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border: 1px solid var(--line);
  margin-top: 20px;
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  transition: border-color 0.3s, background 0.3s;
}
.banner.warn { border-color: var(--yellow); background: var(--yellow-dim); }
.banner.urgent { border-color: var(--red); background: var(--red-dim); }
.banner-icon {
  font-size: 20px;
  flex-shrink: 0;
  width: 28px;
  text-align: center;
}

/* ── Activity ── */
.act-bars { display: flex; flex-direction: column; gap: 8px; }
.act-row { display: flex; align-items: center; gap: 8px; }
.act-name {
  width: 72px;
  font-size: 11px;
  color: var(--dim);
  text-align: right;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.act-track {
  flex: 1;
  height: 4px;
  background: var(--line);
  position: relative;
  overflow: hidden;
}
.act-fill {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  background: var(--red);
  transition: width 0.3s;
}
.act-pct {
  width: 32px;
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── EMG grid ── */
.emg-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
}
.emg-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.emg-track {
  width: 100%;
  height: 40px;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}
.emg-fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: var(--red);
  opacity: 0.7;
  transition: height 0.15s;
}
.emg-lbl {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 0.5px;
}
.emg-val {
  font-size: 9px;
  color: var(--dim);
  font-variant-numeric: tabular-nums;
}

/* ── Chart ── */
.chart-wrap { height: 140px; margin-top: 4px; }

/* ── Alerts ── */
.alerts {
  max-height: 160px;
  overflow-y: auto;
  scrollbar-width: none;
}
.alerts::-webkit-scrollbar { display: none; }
.alert-item {
  display: flex;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  font-size: 12px;
  color: var(--dim);
  animation: fadeUp 0.25s ease-out;
}
.alert-time {
  color: var(--muted);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.alert-item.critical .alert-time { color: var(--red); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Footer ── */
.ftr {
  text-align: center;
  padding: 20px 0;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">FLUX<i>CHI</i></div>
  <div class="hdr-status">
    <span class="dot" id="dot"></span>
    <span id="connText">OFFLINE</span>
  </div>
</div>

<div class="page">

  <!-- ── Stamina ── -->
  <div class="sec full">
    <div class="ring-wrap">
      <div class="ring-outer">
        <svg class="ring-svg" viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="88" />
          <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="88" />
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ringNum">—</div>
          <div class="ring-unit">STAMINA</div>
          <div class="ring-state" id="ringState">—</div>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="sWork">0</div>
        <div class="stat-lbl">WORK MIN</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sTotal">0</div>
        <div class="stat-lbl">TOTAL MIN</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sSuggest">—</div>
        <div class="stat-lbl" id="sSuggestLbl">ESTIMATE</div>
      </div>
    </div>

    <div id="bannerWrap"></div>
  </div>

  <!-- ── Dimensions ── -->
  <div class="sec">
    <div class="sec-label">DIMENSIONS</div>
    <div class="dims">
      <div class="dim">
        <div class="dim-val" id="dCon">—</div>
        <div class="dim-bar"><div class="dim-bar-fill" id="dConBar" style="width:0%"></div></div>
        <div class="dim-lbl">FOCUS</div>
      </div>
      <div class="dim">
        <div class="dim-val" id="dTen">—</div>
        <div class="dim-bar"><div class="dim-bar-fill" id="dTenBar" style="width:0%"></div></div>
        <div class="dim-lbl">TENSION</div>
      </div>
      <div class="dim">
        <div class="dim-val" id="dFat">—</div>
        <div class="dim-bar"><div class="dim-bar-fill" id="dFatBar" style="width:0%"></div></div>
        <div class="dim-lbl">FATIGUE</div>
      </div>
    </div>
  </div>

  <!-- ── Activity ── -->
  <div class="sec">
    <div class="sec-label">ACTIVITY</div>
    <div class="act-bars" id="actBars"></div>
  </div>

  <!-- ── EMG ── -->
  <div class="sec full">
    <div class="sec-label">EMG CHANNELS</div>
    <div class="emg-grid">
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e1"></div></div><div class="emg-lbl">1</div><div class="emg-val" id="ev1">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e2"></div></div><div class="emg-lbl">2</div><div class="emg-val" id="ev2">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e3"></div></div><div class="emg-lbl">3</div><div class="emg-val" id="ev3">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e4"></div></div><div class="emg-lbl">4</div><div class="emg-val" id="ev4">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e5"></div></div><div class="emg-lbl">5</div><div class="emg-val" id="ev5">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e6"></div></div><div class="emg-lbl">6</div><div class="emg-val" id="ev6">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e7"></div></div><div class="emg-lbl">7</div><div class="emg-val" id="ev7">0</div></div>
      <div class="emg-col"><div class="emg-track"><div class="emg-fill" id="e8"></div></div><div class="emg-lbl">8</div><div class="emg-val" id="ev8">0</div></div>
    </div>
  </div>

  <!-- ── Trend ── -->
  <div class="sec full">
    <div class="sec-label">TREND</div>
    <div class="chart-wrap">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <!-- ── Alerts ── -->
  <div class="sec full">
    <div class="sec-label">ALERTS</div>
    <div class="alerts" id="alerts">
      <div class="alert-item"><span class="alert-time">—</span><span>Waiting for signal...</span></div>
    </div>
  </div>

</div>

<div class="ftr">FLUXCHI V2.1</div>

<script>
const NAMES = {
  typing:'TYPE', mouse_use:'MOUSE', idle:'IDLE', stretching:'STRETCH',
  finger_movement:'FINGER', rest:'REST', wrist_extend:'W.EXT',
  wrist_flex:'W.FLEX', wrist_movement:'W.MOV'
};
const STATES = {
  focused: {t:'FOCUSED', c:'var(--red)'},
  fading:  {t:'FADING',  c:'var(--yellow)'},
  depleted:{t:'DEPLETED',c:'var(--red)'},
  recovering:{t:'RECOVER',c:'var(--green)'}
};
const REC = {keep_working:'CONTINUE', take_break:'TAKE BREAK', start_working:'READY', rest_more:'REST MORE'};

let ws, knownActs = new Set(), history = [];
const MAX_H = 150;

const ringEl = document.getElementById('ringFg');
const CIRC = 2 * Math.PI * 88;
ringEl.style.strokeDasharray = CIRC;
ringEl.style.strokeDashoffset = CIRC;

const chart = new Chart(document.getElementById('trendChart'), {
  type:'line',
  data:{labels:[], datasets:[{
    data:[], borderColor:'#d71921', backgroundColor:'rgba(215,25,33,0.06)',
    fill:true, tension:0.3, pointRadius:0, borderWidth:1.5
  }]},
  options:{
    responsive:true, maintainAspectRatio:false,
    animation:{duration:0},
    scales:{
      x:{display:false},
      y:{min:0, max:100, ticks:{color:'#555', font:{family:'JetBrains Mono',size:10}, callback:v=>v+'%'}, grid:{color:'#1a1a1a'}}
    },
    plugins:{legend:{display:false}}
  }
});

function connect(){
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = ()=>{
    document.getElementById('dot').className='dot on';
    document.getElementById('connText').textContent='LIVE';
  };
  ws.onclose = ()=>{
    document.getElementById('dot').className='dot';
    document.getElementById('connText').textContent='OFFLINE';
    setTimeout(connect, 2000);
  };
  ws.onmessage = e=>{
    const d = JSON.parse(e.data);
    if(d.type==='state_update') render(d);
  };
}

function render(d){
  const st = d.stamina||{};
  const dec = d.decision||{};
  const val = st.value!=null ? st.value : 100;
  const state = st.state||'focused';

  // Ring
  const offset = CIRC * (1 - val/100);
  ringEl.style.strokeDashoffset = offset;
  const sInfo = STATES[state]||STATES.focused;
  ringEl.style.stroke = sInfo.c;
  document.getElementById('ringNum').textContent = Math.round(val);
  const rs = document.getElementById('ringState');
  rs.textContent = sInfo.t;
  rs.style.color = sInfo.c;

  // Stats
  document.getElementById('sWork').textContent = Math.round(dec.continuous_work_min||0);
  document.getElementById('sTotal').textContent = Math.round(dec.total_work_min||0);
  const sugEl = document.getElementById('sSuggest');
  const sugLbl = document.getElementById('sSuggestLbl');
  if(state==='recovering'){
    sugEl.textContent = Math.round(st.suggested_break_min||0);
    sugLbl.textContent = 'REST MIN';
  } else {
    sugEl.textContent = Math.round(st.suggested_work_min||0);
    sugLbl.textContent = 'FOCUS MIN';
  }

  // Banner
  const bw = document.getElementById('bannerWrap');
  const rec = REC[dec.recommendation]||'';
  const reasons = (dec.reasons||[]).join(' · ');
  if(dec.urgency>=0.5){
    bw.innerHTML = `<div class="banner ${dec.urgency>=0.7?'urgent':'warn'}"><span class="banner-icon">${dec.urgency>=0.7?'◉':'◎'}</span><span>${rec} — ${reasons}</span></div>`;
  } else if(reasons){
    bw.innerHTML = `<div class="banner"><span class="banner-icon">·</span><span>${reasons}</span></div>`;
  }

  // Dimensions
  const con = (st.consistency||0)*100, ten = (st.tension||0)*100, fat = (st.fatigue||0)*100;
  document.getElementById('dCon').textContent = Math.round(con)+'%';
  document.getElementById('dTen').textContent = Math.round(ten)+'%';
  document.getElementById('dFat').textContent = Math.round(fat)+'%';
  document.getElementById('dConBar').style.width = con+'%';
  document.getElementById('dTenBar').style.width = ten+'%';
  document.getElementById('dFatBar').style.width = fat+'%';

  // Activity
  const probs = d.probabilities||{};
  const keys = Object.keys(probs);
  if(keys.length && keys.some(k=>!knownActs.has(k))){
    knownActs = new Set(keys);
    const c = document.getElementById('actBars');
    c.innerHTML = '';
    for(const k of keys){
      const row = document.createElement('div');
      row.className='act-row';
      row.innerHTML = `<span class="act-name">${NAMES[k]||k}</span><div class="act-track"><div class="act-fill" id="af-${k}"></div></div><span class="act-pct" id="ap-${k}">0%</span>`;
      c.appendChild(row);
    }
  }
  for(const [k,v] of Object.entries(probs)){
    const f=document.getElementById('af-'+k), p=document.getElementById('ap-'+k);
    if(f) f.style.width=(v*100).toFixed(0)+'%';
    if(p) p.textContent=(v*100).toFixed(0)+'%';
  }

  // EMG
  const rms = d.rms||[];
  const mx = Math.max(...rms, 1);
  for(let i=0;i<8;i++){
    const v=rms[i]||0;
    const f=document.getElementById('e'+(i+1));
    const ev=document.getElementById('ev'+(i+1));
    if(f) f.style.height=Math.min(100,(v/mx)*100)+'%';
    if(ev) ev.textContent=Math.round(v);
  }

  // Trend
  history.push(val);
  if(history.length>MAX_H) history.shift();
  chart.data.labels = history.map((_,i)=>i);
  chart.data.datasets[0].data = history;
  chart.update();

  // Alerts
  if(dec.urgency>=0.5){
    const now = new Date();
    const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'alert-item'+(dec.urgency>=0.7?' critical':'');
    el.innerHTML = `<span class="alert-time">${ts}</span><span>${reasons}</span>`;
    const ac = document.getElementById('alerts');
    const first = ac.firstElementChild;
    if(first && first.textContent.includes('Waiting')) ac.innerHTML='';
    ac.prepend(el);
    while(ac.children.length>20) ac.removeChild(ac.lastChild);
  }
}

connect();
</script>
</body>
</html>
